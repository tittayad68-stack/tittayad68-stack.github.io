<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITY Register</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=PT+Serif&family=Mali&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="register.css">
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
    <h1 class="logo" lang="en">VITY</h1>

    <nav>
        <ul>
            <li lang="en"><a href="home.html">HOME</a></li>
            <li lang="en"><a href="shop.html">PRODUCT</a></li>
            <li lang="en"><a href="review.html">REVIEW</a></li>
            <li lang="en"><a href="contact.html">CONTACT</a></li>
            <li lang="en"><a href="register.html">REGISTER</a></li>
        </ul>
    </nav>

</header>

<main>

<section class="register">

    <h2 lang="en">Create Account</h2>

    <form class="register-form">

        <!-- ชื่อ -->
        <div class="form-group">
            <label>ชื่อ - นามสกุล</label>
            <input type="text" placeholder="กรอกชื่อ-นามสกุล" required>
        </div>

        <!-- Email -->
        <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="example@gmail.com" required>
        </div>

        <!-- Password -->
        <div class="form-group">
            <label>Password</label>
            <input type="password" placeholder="รหัสผ่าน" required>
        </div>

        <!-- Address -->
        <div class="form-group">
            <label>ที่อยู่จัดส่ง</label>
            <textarea placeholder="กรอกที่อยู่..." required></textarea>
        </div>

        <!-- Phone -->
        <div class="form-group">
            <label>เบอร์โทร</label>
            <input type="tel" placeholder="08xxxxxxxx" required>
        </div>

        <!-- Submit -->
        <button type="submit" class="submit-btn" lang="en">REGISTER</button>

    </form>

</section>

</main>

<footer>
    <p lang="en">© 2026 VITY Gummies</p>
</footer>

</body>
</html>
